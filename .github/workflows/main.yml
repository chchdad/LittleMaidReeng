name: Build LMR Mod

on: 
  workflow_dispatch:
  push:
    branches: [ "master", "main" ] # 每次推送到主分支时自动编译

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: ☕ 设置 Java 8 并自动开启 Gradle 缓存
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'   
          cache: 'gradle'       
          
      - name: 🔨 赋予 Gradle 执行权限
        run: chmod +x ./gradlew

      - name: 🚀 编译并构建模组
        run: ./gradlew build

      - name: 📦 上传编译好的 Mod 本体
        uses: actions/upload-artifact@v4
        with:
          name: compiled-lmr-mod
          path: build/libs/*.jar
